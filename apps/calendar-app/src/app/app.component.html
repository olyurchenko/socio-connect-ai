<div class="app-shell">
  <sc-ui-sidenav
    class="app-nav"
    [mode]="'side'"
    [opened]="true"
    [hasBackdrop]="false"
    position="start"
    [style.--sc-sidenav-width]="isLocationMatchingStep() ? '520px' : null"
  >
    <ng-container sidenavContent>
      <div class="nav-header">
        <div class="nav-logo">
          <img class="nav-logo__image" src="assets/logo.svg" alt="Socio Connect Logo" />
          <span class="nav-logo__text">Socio Connect</span>
        </div>
      </div>

      <nav class="nav-menu" role="navigation" aria-label="Main navigation">
        @for (item of navItems; track item.route) {
          <a
            class="nav-item"
            [routerLink]="item.route"
            routerLinkActive="nav-item--active"
            [routerLinkActiveOptions]="{ exact: false }"
            [attr.aria-label]="item.label"
          >
            <span class="material-icons-round nav-item__icon">{{ item.icon }}</span>
            <span class="nav-item__label">{{ item.label }}</span>
          </a>
        }
      </nav>

      <div class="nav-panel">
        @if (isLocationMatchingStep()) {
          <sc-location-sidebar />
        } @else {
          <sc-filter-panel />
        }
      </div>
    </ng-container>

    <ng-container mainContent>
      <main class="app-main" role="main">
        <router-outlet />
      </main>
    </ng-container>
  </sc-ui-sidenav>
</div>
