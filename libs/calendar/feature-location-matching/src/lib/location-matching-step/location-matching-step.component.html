@if (event(); as event) {
  <div class="lm-step">
    <sc-location-matching-header [event]="event" [radiusMeters]="radiusMeters()" />

    <div class="lm-step__body">
      @if (isInitialLoading()) {
        <div class="lm-step__loader">
          <sc-ui-spinner [diameter]="40" />
        </div>
      } @else {
        <sc-location-map class="lm-step__map" />
      }
    </div>
  </div>
}
